{% extends "base.html" %}
{% block title %}404 — Page introuvable{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="text-align:center;max-width:500px;">
    <div style="font-size:6rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">404</div>
    <h1 style="font-size:1.5rem;margin:1rem 0 0.5rem;">Page introuvable</h1>
    <p style="color:var(--text-muted);">La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="{{ url_for('index') }}" class="btn-primary-custom mt-3" style="padding:0.75rem 2rem;">
      <i class="bi bi-house me-2"></i>Retour à l'accueil
    </a>
  </div>
</div>
{% endblock %}
