<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — ELECTRO-ORDINATEUR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="admin-login-page">

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <i class="bi bi-cpu-fill"></i>
    </div>

    <h1 class="mb-1">Administration</h1>
    <p class="mb-4">ELECTRO-ORDINATEUR</p>

    <!-- Flashes -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category=='danger' else 'warning' }}" style="font-size:0.85rem;border-radius:10px;">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="post" action="{{ url_for('admin_login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" name="username" class="form-control" placeholder="admin"
                 autocomplete="username" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" class="form-control" placeholder="••••••••"
                 autocomplete="current-password" required id="passwordInput">
          <button type="button" class="input-group-text" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);cursor:pointer;"
                  onclick="togglePwd()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-shield-check me-2"></i>Se connecter
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" style="color:rgba(255,255,255,0.35);font-size:0.8rem;">
        <i class="bi bi-arrow-left me-1"></i>Retour à la boutique
      </a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
